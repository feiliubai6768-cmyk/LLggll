<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控 - LVGL GUI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>

        <aside class="sidebar glass-panel">
            <div class="nav-menu">
                <button class="nav-item active" onclick="location.href='monitoring.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    实时监控
                </button>
                <button class="nav-item" onclick="location.href='settings.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    参数设置
                </button>
                <button class="nav-item" onclick="location.href='history.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    历史记录
                </button>
                <button class="nav-item" onclick="location.href='transfer.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    数据传输
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="dose-rate">
                    <div class="label">剂量率</div>
                    <div class="value">0.08 <span class="unit">μSv/h</span></div>
                </div>
                <div class="datetime">
                    <div class="time" id="current-time">11:26:14</div>
                    <div class="date" id="current-date">2024/06/20</div>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <section id="monitoring" class="screen active">
                <header class="glass-header">
                    <h2>实时监控</h2>
                    <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg></button>
                </header>
                <div class="glass-card chart-container">
                    <h3 class="chart-title">数据曲线</h3>
                    <div class="chart-wrapper">
                        <canvas id="doseChart"></canvas>
                    </div>
                </div>
                <div class="status-bar glass-card">
                    <div class="status-indicator"></div>
                    <span>运行正常</span>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function() {
            // Clock
            var timeEl = document.getElementById('current-time');
            var dateEl = document.getElementById('current-date');
            function updateClock() {
                var now = new Date();
                timeEl.textContent = [String(now.getHours()).padStart(2,'0'), String(now.getMinutes()).padStart(2,'0'), String(now.getSeconds()).padStart(2,'0')].join(':');
                dateEl.textContent = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
            }
            setInterval(updateClock, 1000);
            updateClock();

            // Chart
            var ctx = document.getElementById('doseChart');
            if (ctx) {
                var gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, 'rgba(0, 229, 255, 0.5)');
                gradient.addColorStop(1, 'rgba(0, 229, 255, 0.0)');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['240','210','180','150','120','90','60','30','0'],
                        datasets: [{
                            label: '剂量率 (μSv/h)',
                            data: [0.05,0.06,0.05,0.08,0.07,0.09,0.08,0.08,0.08],
                            borderColor: '#00e5ff',
                            backgroundColor: gradient,
                            borderWidth: 2,
                            pointBackgroundColor: '#0a0e17',
                            pointBorderColor: '#00e5ff',
                            pointBorderWidth: 2,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(10,14,23,0.8)', titleColor: '#fff', bodyColor: '#00e5ff', borderColor: 'rgba(0,255,255,0.2)', borderWidth: 1, padding: 10, displayColors: false } },
                        scales: {
                            x: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 12 } }, title: { display: true, text: '时间(秒)', color: '#94a3b8', font: { size: 12 } } },
                            y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#00e5ff', font: { size: 12 }, stepSize: 0.2, callback: function(v) { return v.toFixed(1); } }, min: 0.0, max: 1.0, position: 'right', title: { display: true, text: '剂量率 (μSv/h)', color: '#00e5ff', font: { size: 12 } } }
                        }
                    }
                });
            }
        })();
    </script>
</body>
</html>
