<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据传输 - LVGL GUI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>

        <aside class="sidebar glass-panel">
            <div class="nav-menu">
                <button class="nav-item" onclick="location.href='monitoring.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    实时监控
                </button>
                <button class="nav-item" onclick="location.href='settings.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    参数设置
                </button>
                <button class="nav-item" onclick="location.href='history.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    历史记录
                </button>
                <button class="nav-item active" onclick="location.href='transfer.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    数据传输
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="dose-rate">
                    <div class="label">剂量率</div>
                    <div class="value">0.08 <span class="unit">μSv/h</span></div>
                </div>
                <div class="datetime">
                    <div class="time" id="current-time">11:26:14</div>
                    <div class="date" id="current-date">2024/06/20</div>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <section id="transfer" class="screen active">
                <div class="glass-card centered-card">
                    <header class="card-header">
                        <h2><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg> 传输速度</h2>
                        <button class="close-btn" onclick="location.href='monitoring.html'">×</button>
                    </header>
                    <div class="card-body">
                        <div class="transfer-box">
                            <div class="box-header"><span>TF卡 (数据源)</span> <span class="cyan-text">0GB/0GB</span></div>
                            <div class="progress-bar-container"><div class="progress-bar" style="width: 2%;"></div></div>
                        </div>
                        <div class="transfer-box">
                            <div class="box-header"><span>U盘 (目标源)</span> <span class="cyan-text">0GB 空闲</span></div>
                            <div class="progress-bar-container"><div class="progress-bar" style="width: 5%;"></div></div>
                        </div>

                        <div class="transfer-box date-box">
                            <div class="box-header"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> 日期选择</div>
                            <div class="date-inputs">
                                <div class="date-field">
                                    <label>开始日期</label>
                                    <input type="text" class="glass-input full-width" value="2024/04/22">
                                </div>
                                <div class="date-field">
                                    <label>结束日期</label>
                                    <input type="text" class="glass-input full-width" value="2024/04/22">
                                </div>
                            </div>
                        </div>

                        <div class="action-row align-right">
                            <button class="glass-btn primary-btn" onclick="location.href='copy.html'"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg> 开始拷贝</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function() {
            var timeEl = document.getElementById('current-time');
            var dateEl = document.getElementById('current-date');
            function updateClock() {
                var now = new Date();
                timeEl.textContent = [String(now.getHours()).padStart(2,'0'), String(now.getMinutes()).padStart(2,'0'), String(now.getSeconds()).padStart(2,'0')].join(':');
                dateEl.textContent = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
            }
            setInterval(updateClock, 1000);
            updateClock();
        })();
    </script>
</body>
</html>
