<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参数设置 - LVGL GUI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>
        <div class="bg-shape shape3"></div>

        <aside class="sidebar glass-panel">
            <div class="nav-menu">
                <button class="nav-item" onclick="location.href='monitoring.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    实时监控
                </button>
                <button class="nav-item active" onclick="location.href='settings.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    参数设置
                </button>
                <button class="nav-item" onclick="location.href='history.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    历史记录
                </button>
                <button class="nav-item" onclick="location.href='transfer.html'">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    数据传输
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="dose-rate">
                    <div class="label">剂量率</div>
                    <div class="value">0.08 <span class="unit">μSv/h</span></div>
                </div>
                <div class="datetime">
                    <div class="time" id="current-time">11:26:14</div>
                    <div class="date" id="current-date">2024/06/20</div>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <section id="settings" class="screen active">
                <header class="glass-header">
                    <h2>参数设置</h2>
                </header>
                <div class="scroll-container">
                    <div class="glass-card setting-group">
                        <h3><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg> 测量设置</h3>
                        <div class="setting-row">
                            <span class="setting-label">剂量率阈值</span>
                            <div class="custom-select">
                                <select>
                                    <option>0.5 μSv/h</option>
                                    <option>1.0 μSv/h</option>
                                    <option>2.0 μSv/h</option>
                                </select>
                            </div>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">声光报警</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>

                    <div class="glass-card setting-group">
                        <h3><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> 系统设置</h3>
                        <div class="setting-row">
                            <span class="setting-label">设置时间</span>
                            <div class="input-group">
                                <input type="text" class="glass-input" value="2024/04/22">
                                <input type="text" class="glass-input" value="11:20:50">
                            </div>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">息屏时间</span>
                            <div class="custom-select">
                                <select>
                                    <option>1分钟</option>
                                    <option>5分钟</option>
                                    <option>10分钟</option>
                                    <option>永不</option>
                                </select>
                            </div>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">背光亮度</span>
                            <div class="slider-group">
                                <input type="range" min="1" max="100" value="90" class="range-slider">
                                <span class="slider-val">90%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function() {
            // Clock
            var timeEl = document.getElementById('current-time');
            var dateEl = document.getElementById('current-date');
            function updateClock() {
                var now = new Date();
                timeEl.textContent = [String(now.getHours()).padStart(2,'0'), String(now.getMinutes()).padStart(2,'0'), String(now.getSeconds()).padStart(2,'0')].join(':');
                dateEl.textContent = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
            }
            setInterval(updateClock, 1000);
            updateClock();

            // Range Slider
            var sliders = document.querySelectorAll('.range-slider');
            sliders.forEach(function(slider) {
                var valSpan = slider.nextElementSibling;
                slider.addEventListener('input', function(e) {
                    valSpan.textContent = e.target.value + '%';
                });
            });
        })();
    </script>
</body>
</html>
